<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f2f6;
            padding: 30px;
        }
        .page-title {
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 25px;
        }
        .booking-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        th {
            background: #0984e3 !important;
            color: white !important;
            text-align: center;
        }
        td {
            vertical-align: middle;
            text-align: center;
        }
        .btn-primary,
        .btn-danger {
            border-radius: 8px;
            padding: 4px 12px;
        }
    </style>
</head>

<body>

<h2 class="page-title">All Bookings</h2>

<div class="table-responsive booking-table">
    <table class="table table-hover mb-0">
        <thead>
            <tr>
                <th>User</th>
                <th>Turf</th>
                <th>Date</th>
                <th>Time</th>
                <th width="160">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for b in bookings %}
            <tr>
                <td>{{ b.user.username }}</td>
                <td>{{ b.turf.name }}</td>
                <td>{{ b.date }}</td>
                <td>{{ b.start_time }} – {{ b.end_time }}</td>
                <td>
                    <a href="{% url 'admin_booking_update' b.pk %}" class="btn btn-sm btn-primary me-1">
                        Edit
                    </a>
                    <a href="{% url 'admin_booking_delete' b.pk %}"
                       class="btn btn-sm btn-danger"
                       >
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
