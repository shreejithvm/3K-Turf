<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f2f6;
            padding: 30px;
        }
        .page-title {
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #2d3436;
            margin-bottom: 25px;
        }
        .turf-table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        th {
            background: #20bf6b !important;
            color: white !important;
            text-align: center;
        }
        td {
            vertical-align: middle;
            text-align: center;
        }
        .btn-primary {
            border-radius: 8px;
        }
        .btn-danger {
            border-radius: 8px;
        }
        .top-actions {
            display: flex;
            justify-content: end;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div>
<h2 class="page-title">Turf Management</h2>

<div class="top-actions">
    <a href="{% url 'admin_turf_add' %}" class="btn btn-success">
        + Add New Turf
    </a>
</div>

<div class="table-responsive turf-table">
    <table class="table table-hover mb-0">
        <thead>
            <tr>
                <th>Name</th>
                <th>Sport</th>
                <th>District</th>
                <th width="180">Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for t in turfs %}
            <tr>
                <td>{{ t.name }}</td>
                <td>{{ t.sport }}</td>
                <td>{{ t.district }}</td>
                <td>
                    <a href="{% url 'admin_turf_edit' t.id %}" class="btn btn-sm btn-primary me-1">
                        Edit
                    </a>

                    <a href="{% url 'admin_turf_delete' t.id %}" 
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure you want to delete this turf?');">
                        Delete
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</div>
</body>
</html>
