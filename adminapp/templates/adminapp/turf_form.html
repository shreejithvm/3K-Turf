<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>{{ form.instance.pk|yesno:"Edit Turf,Add Turf" }}</title>

    <style>
        body {
            background: #f1f2f6;
        }
        .turf-card {
            max-width: 600px;
            margin: 60px auto;
            border-radius: 18px;
        }
        .turf-header {
            background: #20bf6b;
            padding: 18px;
            border-radius: 18px 18px 0 0;
        }
        .turf-header h3 {
            margin: 0;
            color: white;
            text-align: center;
            letter-spacing: 1px;
        }
        .btn-success {
            width: 100%;
            padding: 10px;
            font-size: 17px;
            border-radius: 10px;
        }
        .form-control {
            border-radius: 10px !important;
            padding: 8px 12px;
            box-shadow: none !important;
        }
        label {
            font-weight: 600;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="card shadow turf-card">
    <div class="turf-header">
        <h3>{{ form.instance.pk|yesno:"Edit Turf,Add Turf" }}</h3>
    </div>

    <div class="card-body">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success mt-3">Save</button>
        </form>
    </div>
</div>

</body>
</html>
