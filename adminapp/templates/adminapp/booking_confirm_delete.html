<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Confirm Delete</title>

    <style>
        body {
            background: #f0f2f5;
        }

        .delete-card {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #c0392b;
            font-weight: 700;
            text-align: center;
        }

        ul {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
        }

        .btn {
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="delete-card">
    <h2><i class="fas fa-exclamation-triangle me-2"></i>Confirm Delete</h2>

    <p class="mt-3 text-center">Are you sure you want to delete this booking?</p>

    <ul>
        <li><strong>User:</strong> {{ booking.user.username }}</li>
        <li><strong>Turf:</strong> {{ booking.turf.name }}</li>
        <li><strong>Date:</strong> {{ booking.date }}</li>
        <li><strong>Time:</strong> {{ booking.start_time }} to {{ booking.end_time }}</li>
    </ul>

    <form method="post" class="mt-3 d-flex justify-content-between">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">
            <i class="fas fa-trash-alt me-1"></i> Delete
        </button>
        <a href="{% url 'booking_list' %}" class="btn btn-secondary px-4">
            Cancel
        </a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
