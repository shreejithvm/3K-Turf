<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel | Turf Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .admin-box {
      width: 380px;
      background: white;
      padding: 35px 30px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0,0,0,0.15);
    }

    .admin-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 25px;
      color: #2b2d42;
    }

    .admin-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      font-weight: 500;
      border-radius: 8px;
      border: none;
      transition: 0.3s;
      text-decoration: none;
      color: white;
    }

    .btn-add { background: #2b8a3e; }
    .btn-manage { background: #1e88e5; }
    .btn-bookings { background: #8e24aa; }

    .admin-btn:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="admin-box">

    <div class="admin-title">Admin Panel</div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-info alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <a href="{% url 'admin_turf_add' %}" class="admin-btn btn-add">➕ Add Turf</a>
    <a href="{% url 'admin_turf_list' %}" class="admin-btn btn-manage">⚙ Manage Turf</a>
    <a href="{% url 'booking_list' %}" class="admin-btn btn-bookings">📅 Bookings</a>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
