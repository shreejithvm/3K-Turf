{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4" style="max-width: 420px; width: 100%;">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-success" style="font-size: 3rem;"></i>
      <h3 class="mt-2">Set New Password</h3>
      <p class="text-muted">Enter your new password below.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success w-100 mt-3">
        <i class="bi bi-check-circle-fill me-2"></i> Change Password
      </button>
    </form>
  </div>
</div>
{% endblock %}
