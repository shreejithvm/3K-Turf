{% extends "base.html" %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4" style="max-width: 420px; width: 100%;">
    <div class="text-center mb-4">
      <i class="bi bi-lock-fill text-primary" style="font-size: 3rem;"></i>
      <h3 class="mt-2">Forgot Password?</h3>
      <p class="text-muted">Enter your email address and we’ll send you a reset link.</p>
    </div>
    <form method="post">
      {% csrf_token %}
      {{ form.email }}
      <button type="submit" class="btn btn-primary w-100 mt-3">
        <i class="bi bi-envelope-fill me-2"></i> Send Reset Link
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="{% url 'login' %}" class="text-decoration-none">
        <i class="bi bi-arrow-left-circle me-1"></i> Back to Login
      </a>
    </div>
  </div>
</div>
{% endblock %}
