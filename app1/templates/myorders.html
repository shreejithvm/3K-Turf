<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.0.0-beta1/css/bootstrap.min.css" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" />

  <title>Turf Bookings</title>

  <style>
    body {
      background: linear-gradient(135deg, #d4f5e9, #f0fff4);
      padding-top: 90px;
    }

    /* ---------- NAVBAR ---------- */
    .custom-navbar {
      background: linear-gradient(90deg, #0f5132, #198754);
      padding: 15px 0;
    }

    .navbar-brand {
      font-size: 22px;
      font-weight: 700;
      color: #fff !important;
      letter-spacing: 1px;
    }

    .nav-link {
      color: #e9f7ef !important;
      font-weight: 500;
      margin-right: 15px;
      transition: 0.3s ease;
    }

    .nav-link:hover {
      color: #ffffff !important;
      transform: translateY(-2px);
    }

    .logout-btn {
      border-radius: 25px;
      padding: 6px 18px;
    }

    /* ---------- CARD ---------- */
    .gradient-header {
      background: linear-gradient(45deg, #198754, #20c997);
    }

    .turf-card {
      transition: all 0.3s ease;
    }

    .turf-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
    }

    .custom-btn {
      border-radius: 30px;
      transition: 0.3s ease;
    }

    .custom-btn:hover {
      background-color: #145c32;
      transform: scale(1.05);
    }

    .booking-info {
      background-color: #e9f7ef;
      padding: 12px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <!-- PROFESSIONAL NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow custom-navbar">
    <div class="container">


      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">

        <ul class="navbar-nav ms-auto align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'home' %}">
              <i class="fas fa-home"></i> Home
            </a>
          </li>




        </ul>

      </div>
    </div>
  </nav>

  <!-- BOOKING CARDS -->
  <div class="container d-flex flex-wrap justify-content-center">

    {% for order in orders %}
    <div class="card turf-card border-0 shadow-lg rounded-4 m-3" style="width: 22rem;">

      <div class="card-header text-white text-center rounded-top-4 gradient-header">
        <h5 class="mb-0 fw-bold">
          ⚽ Turf Booking
        </h5>
      </div>

      <div class="card-body">

        <h6 class="fw-bold text-success mb-3">
          🏟 {{order.turf}}
        </h6>

        <div class="booking-info">
          <p class="mb-2">
            📅 <strong>Date:</strong> {{order.date}}
          </p>

          <p class="mb-3">
            ⏰ <strong>Time:</strong> {{order.start_time}} - {{order.end_time}}
          </p>
        </div>

        <br>

        <div class="d-grid">
          <a href="{% url 'book_delete' order.id %}" class="btn btn-danger btn-sm">
            Cancel Slot
          </a>
        </div>

      </div>

      <div class="card-footer text-center border-0 bg-white">
        <small class="text-muted">Enjoy your match 🌿</small>
      </div>

    </div>
    {% endfor %}

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.0.0-beta1/js/bootstrap.bundle.min.js"></script>

</body>

</html>
