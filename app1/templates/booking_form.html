<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.0.0-beta1/css/bootstrap.min.css"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
    />

    <title>Book Turf</title>

    <!-- 🌟 ATTRACTIVE INTERNAL CSS -->
    <style>
      /* Background gradient */
      body {
        margin: 0;
        background: linear-gradient(135deg, #3cec21, white);
        display: flex;
        height: 100vh;
        width: 100vw;
        justify-content: center;
        align-items: center;
        font-family: "Inter", sans-serif;
      }

      /* Booking Card */
      .booking-card {
        background: white;
        width: 420px;
        padding: 30px 35px;
        border-radius: 18px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        animation: fadeIn 0.5s ease-in-out;
      }

      /* Smooth Fade Animation */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Title */
      .booking-card h2 {
        font-weight: 700;
        font-size: 1.8rem;
        color: #0b3d2e;
        margin-bottom: 20px;
        text-align: center;
      }

      /* Form field spacing */
      .booking-card p {
        margin-bottom: 15px;
      }

      /* Submit button */
      .booking-btn {
        width: 100%;
        padding: 10px;
        background: green;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
        transition: 0.25s ease;
      }

      .booking-btn:hover {
        background: #138c5a;
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
      }

      /* Label styling */
      label {
        font-weight: 600;
        color: #0b3d2e;
      }

      input,
      select {
        border-radius: 6px !important;
        border-color: #cfe4da !important;
      }
    </style>
  </head>

  <body>

    {% block content %}

    <div class="booking-card">
      <!-- <button class="btn btn-info" href="{% url 'home' %}" >⬅️</button> -->
      <h2>BOOK {{ turf.name }}</h2>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="booking-btn">Book Now</button>
      </form>
    </div>

    {% endblock %}
    
    {% block footer %}
<!-- empty: no footer -->
{% endblock %}

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const startField = document.querySelector("#id_start_time");
        const endField = document.querySelector("#id_end_time");

        startField.addEventListener("change", function () {
          const start = startField.value;
          if (start) {
            let [hour, minute] = start.split(":").map(Number);
            hour = (hour + 1) % 24;
            endField.value = `${hour.toString().padStart(2, "0")}:${minute
              .toString()
              .padStart(2, "0")}`;
          }
        });
      });
    </script>
  </body>
</html>
